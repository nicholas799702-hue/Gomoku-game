<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>宿屋的五子棋挑戰</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:#050505;}
#shell{width:100%;background:#050505;display:flex;align-items:flex-start;justify-content:center;}
#app{font-family:'Noto Serif JP',serif;background:#080808;width:480px;flex-shrink:0;position:relative;}
.pg{display:none;}
.pg.active{display:block;animation:pgIn .45s ease forwards;}
@keyframes pgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ═══ INTRO ═══ */
#pg-intro{background:#080808;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.8rem 1.4rem 1.6rem;position:relative;overflow:hidden;}
#pg-intro::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.14)0,rgba(0,0,0,.14)1px,transparent 1px,transparent 3px);pointer-events:none;z-index:1;}
#pg-intro::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.75)100%);pointer-events:none;z-index:1;}
.crn{position:absolute;width:44px;height:44px;z-index:3;}
.tl{top:10px;left:10px;}.tr{top:10px;right:10px;transform:scaleX(-1);}
.bl{bottom:10px;left:10px;transform:scaleY(-1);}.br{bottom:10px;right:10px;transform:scale(-1);}
.hrule{width:100%;height:1px;background:linear-gradient(90deg,transparent,#6b0000 20%,#cc2222 50%,#6b0000 80%,transparent);position:relative;z-index:2;}
#top-rule{margin-bottom:.9rem;}#bot-rule{margin-top:1.2rem;}
#sub-tag{font-family:'Shippori Mincho B1',serif;font-size:10px;letter-spacing:.35em;color:#8a0000;border:1px solid #3a0000;padding:3px 14px;margin-bottom:.6rem;position:relative;z-index:2;}
#ititle{font-family:'Shippori Mincho B1',serif;font-size:22px;font-weight:800;color:#e8dcc8;letter-spacing:.18em;text-align:center;line-height:1.4;position:relative;z-index:2;text-shadow:0 0 30px rgba(180,20,20,.4);margin-bottom:.2rem;}
#title-acc{width:80px;height:2px;background:linear-gradient(90deg,transparent,#cc2222,transparent);margin:0 auto .8rem;position:relative;z-index:2;}
#hero-wrap{position:relative;z-index:2;width:100%;height:280px;overflow:hidden;border:1px solid #3a0000;box-shadow:0 0 0 1px #000,0 6px 32px rgba(0,0,0,.7);margin-bottom:1rem;background:#0a0a0a;}
#hero-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05) 50%,rgba(0,0,0,.5));pointer-events:none;z-index:1;}
#hero-img{width:100%;height:100%;object-fit:cover;object-position:center 30%;display:block;filter:sepia(.12) brightness(.88) contrast(1.05);}
#copy-wrap{width:100%;position:relative;z-index:2;margin-bottom:1.2rem;}
#copy-border{border:1px solid #2a0000;border-left:3px solid #8a0000;padding:9px 13px;background:rgba(10,0,0,.68);}
#copy-text{font-size:13px;line-height:2;color:#c8b8a0;letter-spacing:.06em;font-weight:300;}
.spark{position:absolute;border-radius:50%;background:#cc2222;opacity:0;animation:spkF linear infinite;z-index:0;}
@keyframes spkF{0%{opacity:0;transform:translateY(0) scale(0);}10%{opacity:.35;}90%{opacity:.08;}100%{opacity:0;transform:translateY(-120px) scale(1.5);}}
#btn-row{display:flex;gap:14px;position:relative;z-index:2;}

/* ── RPG BUTTONS ── */
.rpg-btn{position:relative;font-family:'Shippori Mincho B1',serif;font-size:14px;font-weight:700;letter-spacing:.2em;cursor:pointer;border:none;outline:none;padding:0;background:transparent;transition:filter .15s ease,transform .12s ease;}
.rpg-btn:active{transform:scale(.96);}
.rpg-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.rpg-btn .rpg-inner{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 26px;color:#e8dcc8;position:relative;z-index:1;background:#0d0d0d;clip-path:polygon(10px 0%,calc(100% - 10px) 0%,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0% calc(100% - 10px),0% 10px);border:1px solid #5a3020;box-shadow:inset 0 0 16px rgba(120,40,0,.25);transition:background .18s,box-shadow .18s;white-space:nowrap;}
.rpg-btn:hover .rpg-inner{background:#1a0800;box-shadow:inset 0 0 20px rgba(180,60,0,.35),0 0 10px rgba(200,80,0,.2);color:#f0c888;}
.rpg-btn .rpg-inner::before,.rpg-btn .rpg-inner::after{content:'◆';font-size:8px;position:absolute;top:5px;color:#7a3010;transition:color .18s;}
.rpg-btn .rpg-inner::before{left:8px;}.rpg-btn .rpg-inner::after{right:8px;}
.rpg-btn:hover .rpg-inner::before,.rpg-btn:hover .rpg-inner::after{color:#cc6030;}
#start-btn .rpg-inner{background:#180800;border-color:#8a3010;box-shadow:inset 0 0 20px rgba(160,50,0,.3);}
#start-btn:hover .rpg-inner{background:#2a1000;box-shadow:inset 0 0 28px rgba(220,80,0,.4),0 0 14px rgba(220,80,0,.25);}
.rpg-btn .rpg-top-line{display:block;width:100%;height:1px;background:linear-gradient(90deg,transparent,#8a3010 30%,#8a3010 70%,transparent);margin-bottom:2px;}
.rpg-btn .rpg-bot-line{display:block;width:100%;height:1px;background:linear-gradient(90deg,transparent,#5a2008 30%,#5a2008 70%,transparent);margin-top:2px;}
.rpg-sm .rpg-inner{padding:9px 22px;font-size:13px;}

/* ═══ INNER PAGES ═══ */
#pg-name,#pg-spin,#pg-game{background:#0a0a0a;min-height:100vh;padding:1.1rem 1rem 1.6rem;position:relative;overflow:hidden;}
#pg-name::before,#pg-spin::before,#pg-game::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(180,20,20,.03)60px,rgba(180,20,20,.03)61px);pointer-events:none;}
.pg-h1{text-align:center;font-family:'Shippori Mincho B1',serif;font-size:14px;font-weight:700;color:#8a0000;letter-spacing:.35em;margin-bottom:1rem;}
.pg-h1::after{content:'';display:block;width:60px;height:1px;background:linear-gradient(90deg,transparent,#8a0000,transparent);margin:6px auto 0;}
.cp{display:flex;align-items:flex-start;gap:14px;margin-bottom:1rem;}
.cav{flex-shrink:0;width:68px;height:68px;border-radius:4px;border:1px solid #3a0000;box-shadow:0 0 0 1px #000,0 4px 24px rgba(180,0,0,.3);overflow:hidden;position:relative;}
.cav img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;filter:brightness(.92) contrast(1.05);}
.cav::after{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(100,0,0,.15),transparent 60%);pointer-events:none;}
.cbb{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;}
.cnm{font-size:10px;font-weight:700;color:#8a0000;letter-spacing:.2em;font-family:'Shippori Mincho B1',serif;}
.ctx{background:#111;border:1px solid #2a0000;border-left:3px solid #8a0000;border-radius:0 6px 6px 0;padding:9px 13px;font-size:13px;line-height:1.8;color:#c8b8a0;width:100%;min-height:48px;}
.cdlg{transition:opacity .25s;word-break:break-all;}
#name-deco{font-family:'Shippori Mincho B1',serif;font-size:11px;letter-spacing:.3em;color:#3a0000;margin-bottom:1.1rem;text-align:center;}
#name-card{background:#111;border:1px solid #2a0000;border-top:2px solid #8a0000;border-radius:4px;padding:1.3rem 1.3rem 1.1rem;max-width:280px;margin:0 auto;}
#nc-tit{font-family:'Shippori Mincho B1',serif;font-size:11px;letter-spacing:.25em;color:#5a4a3a;margin-bottom:1rem;}
#name-inp{width:100%;background:#0a0a0a;border:1px solid #2a0000;border-bottom:1px solid #8a0000;border-radius:3px 3px 0 0;padding:10px 14px;font-family:'Shippori Mincho B1',serif;font-size:16px;color:#e8e0d0;letter-spacing:.1em;outline:none;transition:border-color .2s;text-align:center;}
#name-inp::placeholder{color:#3a3028;font-size:13px;}
#name-inp:focus{border-bottom-color:#cc1a1a;}
#name-hint{font-size:10px;color:#3a3028;margin-top:5px;}
#name-err{font-size:11px;color:#cc3333;min-height:16px;margin-top:4px;}
#spin-lbl{text-align:center;font-family:'Shippori Mincho B1',serif;font-size:12px;letter-spacing:.2em;color:#5a4a3a;margin-bottom:1rem;}
#ww{position:relative;width:190px;height:190px;margin:0 auto 1rem;}
#whcv{border-radius:50%;display:block;}
#ptr{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:22px solid #ef4444;filter:drop-shadow(0 0 6px rgba(239,68,68,.7));z-index:10;}
#spin-res{text-align:center;font-family:'Shippori Mincho B1',serif;font-size:13px;color:#c8b8a0;letter-spacing:.1em;min-height:20px;margin-bottom:.8rem;}
#spin-btn-wrap{display:flex;justify-content:center;margin-bottom:.6rem;}
#info-bar{display:flex;justify-content:space-between;align-items:center;background:#111;border:1px solid #1e1e1e;border-top:1px solid #3a0000;border-radius:4px;padding:7px 13px;margin-bottom:.8rem;}
#turn-txt{font-weight:700;color:#c8b8a0;font-size:12px;}
#score{display:flex;gap:12px;}
.si{display:flex;flex-direction:column;align-items:center;line-height:1.3;}
.sl{font-size:9px;letter-spacing:.1em;color:#5a4a3a;}
.sn{font-weight:700;font-size:16px;color:#ef4444;font-family:'Shippori Mincho B1',serif;}
#bw{position:relative;margin:0 auto .9rem;width:100%;}
#gcv{display:block;width:100%;height:auto;cursor:crosshair;border-radius:3px;}
#actbar{display:flex;gap:12px;justify-content:center;}
</style>
</head>

<script>
const SZ=15;let pName='你';
const ic=document.getElementById('pg-intro');
for(let i=0;i<10;i++){const s=document.createElement('div');s.className='spark';const z=Math.random()*3+1;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;bottom:${Math.random()*30}%;animation-duration:${4+Math.random()*5}s;animation-delay:${Math.random()*5}s;`;ic.appendChild(s);}

const PGS=['pg-intro','pg-name','pg-spin','pg-game'];
function goPage(id){PGS.forEach(p=>{const el=document.getElementById(p);el.classList.remove('active');el.style.display='none';});const t=document.getElementById(id);t.style.display='block';requestAnimationFrame(()=>t.classList.add('active'));window.scrollTo(0,0);}
function sd(id,txt){const el=document.getElementById(id);if(!el)return;el.style.opacity=0;setTimeout(()=>{el.textContent=txt;el.style.opacity=1;},200);}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}

const D={
  ni:  ()=>rnd(["……你叫什麼名字。","名字。說。","沒有名字的人，我不跟他下棋。"]),
  nr:  ()=>rnd([`${pName}……是嗎。記住了。`,`呵，${pName}。有意思的名字。`,`${pName}……別讓這個名字蒙羞。`]),
  si:  ()=>rnd([`……轉動它，${pName}。命運會決定一切。`,"呵呵，轉盤決定。有趣。"]),
  pf:  ()=>rnd([`哼。${pName}先走吧。`,`先手？${pName}，別以為這樣就能贏我。`]),
  af:  ()=>rnd(["先落子是我的。……謝謝命運。","先手在我。你準備好了嗎。"]),
  idle:()=>"呵呵，讓我看看你的棋路夠不夠有趣。",
  pl:  ()=>rnd(["真是大膽的一步。","哎呀，這一步走得真大膽。","這種天真的眼神……真讓人忍不住想親手毀掉它啊。","喔？竟然想反過來將了我一軍嗎？","你是真有自信。"]),
  th:  ()=>rnd(["……","讓我想想。","……（凝視棋盤）","……計算中。"]),
  am:  ()=>rnd(["這裡。","就這步。","……落子。"]),
  win: ()=>"這局的『懲罰』，你準備好接受了嗎？",
  los: ()=>"呵呵……你最好不要得意。",
  dr:  ()=>rnd(["……平局。有意思。","呵，不分勝負嗎。"]),
  pw:  ()=>rnd(["……等等。","別高興太早。","……（眼神一沉）"]),
};

document.getElementById('name-inp').addEventListener('keydown',e=>{if(e.key==='Enter')confirmName();document.getElementById('name-err').textContent='';});

function confirmName(){
  const v=document.getElementById('name-inp').value.trim();
  if(!v){document.getElementById('name-err').textContent='請輸入名字。';return;}
  pName=v;document.getElementById('lp').textContent=pName;
  sd('d-name',D.nr());
  setTimeout(()=>{goPage('pg-spin');sd('d-spin',D.si());drawWheel(0);},1000);
}

const SEGS=[{pF:true,col:'#2a0000',tc:'#f87171'},{pF:false,col:'#111',tc:'#d1c4b0'},{pF:true,col:'#200000',tc:'#f87171'},{pF:false,col:'#0d0d0d',tc:'#d1c4b0'}];
const SARC=2*Math.PI/4;let spinning=false,cRot=0;

function drawWheel(rot){
  const cv=document.getElementById('whcv');if(!cv)return;
  const ctx=cv.getContext('2d');const cx=95,cy=95,r=90;
  ctx.clearRect(0,0,190,190);
  ctx.beginPath();ctx.arc(cx,cy,r+2,0,2*Math.PI);ctx.strokeStyle='#7f1d1d';ctx.lineWidth=2;ctx.stroke();
  SEGS.forEach((seg,i)=>{
    const nm=pName.length>5?pName.slice(0,4)+'…':pName;
    const lbl=seg.pF?nm:'湊';
    const s=rot+i*SARC,e=s+SARC;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=seg.col;ctx.fill();ctx.strokeStyle='#3f0000';ctx.lineWidth=1;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(s+SARC/2);ctx.textAlign='right';ctx.fillStyle=seg.tc;ctx.font='bold 11px serif';ctx.fillText(lbl,r-8,4);ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,7,0,2*Math.PI);ctx.fillStyle='#ef4444';ctx.fill();ctx.strokeStyle='#fca5a5';ctx.lineWidth=1.5;ctx.stroke();
}

function spinWheel(){
  if(spinning)return;spinning=true;
  const btn=document.getElementById('spin-btn');if(btn)btn.disabled=true;
  document.getElementById('spin-res').textContent='';
  const tgt=cRot+(6+Math.floor(Math.random()*5))*2*Math.PI+(Math.random()*2*Math.PI);
  const dur=3500,t0=performance.now(),r0=cRot;
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(now){const t=Math.min((now-t0)/dur,1);const rot=r0+(tgt-r0)*ease(t);drawWheel(rot);if(t<1)requestAnimationFrame(frame);else{cRot=rot%(2*Math.PI);spinning=false;resolveResult(cRot);}}
  requestAnimationFrame(frame);
}

function resolveResult(rot){
  const norm=(((-rot)%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(norm/SARC)%4;const pF=SEGS[idx].pF;
  document.getElementById('spin-res').textContent=pF?`✕ ${pName} 為先攻！`:'〇 湊為先攻……';
  sd('d-spin',pF?D.pf():D.af());
  setTimeout(()=>startGame(pF),1200);
}

let bd,pTurn,gOv,aiTh,pF2;let sc={p:0,d:0,a:0};
function ixy(r,c){return r*SZ+c;}
function initBd(){bd=Array(SZ*SZ).fill(0);}

function drawBd(hR=-1,hC=-1){
  const cv=document.getElementById('gcv');if(!cv)return;
  const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
  const mg=W/16,step=(W-2*mg)/(SZ-1);
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#2d2d2d';ctx.lineWidth=1;
  for(let i=0;i<SZ;i++){const x=mg+i*step;ctx.beginPath();ctx.moveTo(x,mg);ctx.lineTo(x,H-mg);ctx.stroke();const y=mg+i*step;ctx.beginPath();ctx.moveTo(mg,y);ctx.lineTo(W-mg,y);ctx.stroke();}
  ctx.strokeStyle='#5a0000';ctx.lineWidth=2;ctx.strokeRect(mg,mg,(SZ-1)*step,(SZ-1)*step);
  [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]].forEach(([r,c])=>{ctx.beginPath();ctx.arc(mg+c*step,mg+r*step,4,0,2*Math.PI);ctx.fillStyle='#444';ctx.fill();});
  if(hR>=0&&hC>=0&&bd[ixy(hR,hC)]===0&&!gOv&&pTurn&&!aiTh){ctx.beginPath();ctx.arc(mg+hC*step,mg+hR*step,step*.38,0,2*Math.PI);ctx.fillStyle='rgba(239,68,68,.28)';ctx.fill();ctx.strokeStyle='rgba(239,68,68,.5)';ctx.lineWidth=1;ctx.stroke();}
  for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){const v=bd[ixy(r,c)];if(!v)continue;const x=mg+c*step,y=mg+r*step,rad=step*.43;ctx.beginPath();ctx.arc(x,y,rad,0,2*Math.PI);if(v===1){const g=ctx.createRadialGradient(x-rad*.3,y-rad*.3,rad*.05,x,y,rad);g.addColorStop(0,'#f87171');g.addColorStop(1,'#7f1d1d');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#3f0000';ctx.lineWidth=1;ctx.stroke();}else{const g=ctx.createRadialGradient(x-rad*.3,y-rad*.3,rad*.05,x,y,rad);g.addColorStop(0,'#ececec');g.addColorStop(1,'#777');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.stroke();}}
}

function gCell(cv,ex,ey){const rect=cv.getBoundingClientRect();const px=(ex-rect.left)*(cv.width/rect.width),py=(ey-rect.top)*(cv.height/rect.height);const mg=cv.width/16,step=(cv.width-2*mg)/(SZ-1);const c=Math.round((px-mg)/step),r=Math.round((py-mg)/step);if(r<0||r>=SZ||c<0||c>=SZ)return null;return{r,c};}
function chkW(r,c,who){const dirs=[[0,1],[1,0],[1,1],[1,-1]];for(const[dr,dc]of dirs){let n=1;for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=SZ||nc<0||nc>=SZ||bd[ixy(nr,nc)]!==who)break;n++;}for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr<0||nr>=SZ||nc<0||nc>=SZ||bd[ixy(nr,nc)]!==who)break;n++;}if(n>=5)return true;}return false;}
function scp(r,c,who){if(bd[ixy(r,c)]!==0)return -Infinity;const dirs=[[0,1],[1,0],[1,1],[1,-1]];let s=0;const op=who===2?1:2;for(const[dr,dc]of dirs){let m=0,b=0,om=0,ob=0;for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=SZ||nc<0||nc>=SZ){b++;break;}const v=bd[ixy(nr,nc)];if(v===who)m++;else if(v===op){b++;break;}else break;}for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr<0||nr>=SZ||nc<0||nc>=SZ){b++;break;}const v=bd[ixy(nr,nc)];if(v===who)m++;else if(v===op){b++;break;}else break;}for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=SZ||nc<0||nc>=SZ){ob++;break;}const v=bd[ixy(nr,nc)];if(v===op)om++;else if(v===who){ob++;break;}else break;}for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr<0||nr>=SZ||nc<0||nc>=SZ){ob++;break;}const v=bd[ixy(nr,nc)];if(v===op)om++;else if(v===who){ob++;break;}else break;}if(m>=4)s+=100000;else if(m===3&&b===0)s+=5000;else if(m===3&&b===1)s+=500;else if(m===2&&b===0)s+=200;else if(m===2&&b===1)s+=50;else if(m===1)s+=10;if(om>=4)s+=80000;else if(om===3&&ob===0)s+=3000;else if(om===3&&ob===1)s+=300;else if(om===2&&ob===0)s+=100;}return s;}
function bm(){let best=-Infinity,br=SZ>>1,bc=SZ>>1;const cands=new Set();let has=false;for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){if(bd[ixy(r,c)]!==0){has=true;for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<SZ&&nc>=0&&nc<SZ&&bd[ixy(nr,nc)]===0)cands.add(nr*SZ+nc);}}}if(!has)cands.add((SZ>>1)*SZ+(SZ>>1));for(const k of cands){const r=Math.floor(k/SZ),c=k%SZ;const s=scp(r,c,2);if(s>best){best=s;br=r;bc=c;}}return{r:br,c:bc};}
function setupCv(){const cv=document.getElementById('gcv');let lH=null;cv.onmousemove=e=>{if(gOv||!pTurn||aiTh)return;const cell=gCell(cv,e.clientX,e.clientY);if(!cell)return;if(lH&&lH.r===cell.r&&lH.c===cell.c)return;lH=cell;drawBd(cell.r,cell.c);};cv.onmouseleave=()=>{lH=null;drawBd();};cv.onclick=e=>{if(gOv||!pTurn||aiTh)return;const cell=gCell(cv,e.clientX,e.clientY);if(!cell||bd[ixy(cell.r,cell.c)]!==0)return;doPl(cell.r,cell.c);lH=null;};cv.ontouchend=e=>{e.preventDefault();if(gOv||!pTurn||aiTh)return;const t=e.changedTouches[0];const cell=gCell(cv,t.clientX,t.clientY);if(!cell||bd[ixy(cell.r,cell.c)]!==0)return;doPl(cell.r,cell.c);};}
function doPl(r,c){bd[ixy(r,c)]=1;drawBd();sd('d-game',D.pl());if(chkW(r,c,1)){endG(1);return;}if(bd.every(v=>v!==0)){endG(0);return;}let dn=false;for(let i=0;i<SZ&&!dn;i++)for(let j=0;j<SZ&&!dn;j++)if(bd[ixy(i,j)]===0&&scp(i,j,2)>=80000)dn=true;if(dn)sd('d-game',D.pw());pTurn=false;aiTh=true;document.getElementById('turn-txt').textContent='湊思考中……';setTimeout(()=>{if(gOv){aiTh=false;return;}const mv=bm();bd[ixy(mv.r,mv.c)]=2;drawBd();if(chkW(mv.r,mv.c,2)){aiTh=false;endG(2);return;}if(bd.every(v=>v!==0)){aiTh=false;endG(0);return;}let nw=false;for(let i=0;i<SZ&&!nw;i++)for(let j=0;j<SZ&&!nw;j++)if(bd[ixy(i,j)]===0&&scp(i,j,2)>=5000)nw=true;if(nw)sd('d-game',D.pw());else sd('d-game',D.am());aiTh=false;pTurn=true;document.getElementById('turn-txt').textContent=`${pName} 的回合（黑）`;},600);}
function endG(w){gOv=true;aiTh=false;if(w===1){sc.p++;document.getElementById('sp').textContent=sc.p;sd('d-game',D.los());document.getElementById('turn-txt').textContent=`${pName} 贏了！`;}else if(w===2){sc.a++;document.getElementById('sa').textContent=sc.a;sd('d-game',D.win());document.getElementById('turn-txt').textContent='湊贏了。';}else{sc.d++;document.getElementById('sd').textContent=sc.d;sd('d-game',D.dr());document.getElementById('turn-txt').textContent='平局。';}}
function aiGo(){aiTh=true;document.getElementById('turn-txt').textContent='湊落下第一子……';setTimeout(()=>{const mv=bm();bd[ixy(mv.r,mv.c)]=2;drawBd();sd('d-game',D.am());aiTh=false;pTurn=true;document.getElementById('turn-txt').textContent=`${pName} 的回合（黑）`;},600);}
function startGame(pF){pF2=pF;initBd();pTurn=pF;gOv=false;aiTh=false;goPage('pg-game');requestAnimationFrame(()=>{setupCv();drawBd();});sd('d-game',D.idle());if(pF)document.getElementById('turn-txt').textContent=`${pName} 的回合（黑）`;else setTimeout(()=>aiGo(),400);}
function nextRound(){initBd();pTurn=pF2;gOv=false;aiTh=false;drawBd();sd('d-game',D.idle());if(pF2)document.getElementById('turn-txt').textContent=`${pName} 的回合（黑）`;else setTimeout(()=>aiGo(),400);}
function resetAll(){sc={p:0,d:0,a:0};['sp','sd','sa'].forEach(id=>document.getElementById(id).textContent='0');pName='你';document.getElementById('name-inp').value='';document.getElementById('name-err').textContent='';const btn=document.getElementById('spin-btn');if(btn)btn.disabled=false;document.getElementById('spin-res').textContent='';spinning=false;goPage('pg-intro');}

goPage('pg-intro');
</script>
